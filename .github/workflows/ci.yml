name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # 每周一 UTC 06:00 运行链接检查（北京时间 14:00）
    - cron: '0 6 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check RST syntax
        run: bash scripts/precommit-check.sh

      - name: Validate glossary
        run: python3 scripts/validate-glossary.py --ci

      - name: Build HTML
        run: make html SPHINXOPTS="-W"  # -W 将警告视为错误

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  linkcheck:
    # 仅在定时触发或手动触发时运行（不阻塞 PR）
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check external links
        run: bash scripts/check-links.sh --ci --warn
